version: '3.8'

services:
  # ========== Nginx 反向代理 + SSL ==========
  nginx:
    image: nginx:alpine
    container_name: photoset-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - frontend
      - admin
      - backend
    networks:
      - photoset-network

  # ========== 数据库 ==========
  mysql:
    image: mysql:8.0
    container_name: photoset-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: photoset
      MYSQL_USER: photoset
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - photoset-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  # ========== Redis 缓存 ==========
  redis:
    image: redis:7.2-alpine
    container_name: photoset-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - photoset-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      timeout: 10s
      retries: 5

  # ========== Go 后端服务（内部服务，不暴露端口） ==========
  backend:
    build:
      context: .
      dockerfile: ./docker/backend.Dockerfile
    container_name: photoset-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: photoset
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: photoset
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SIGN_SECRET: ${SIGN_SECRET}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      AWS_ENDPOINT: ${AWS_ENDPOINT:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_BUCKET_NAME: ${AWS_BUCKET_NAME:-}
      CORS_ALLOW_ORIGINS: "${DOMAIN},https://${DOMAIN}"
      GIN_MODE: release
    volumes:
      - uploads_volume:/app/uploads
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.env:/app/.env:ro
    networks:
      - photoset-network
    # 添加 docker 组权限，使 nonroot 用户能访问 docker socket
    # 注意：1001 是宿主机 docker 组的 GID
    group_add:
      - 1001
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      timeout: 10s
      retries: 5

  # ========== 用户端 Web ==========
  frontend:
    build:
      context: .
      dockerfile: ./docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: http://backend:8080
    container_name: photoset-frontend
    restart: unless-stopped
    networks:
      - photoset-network

  # ========== 管理后台 Web ==========
  admin:
    build:
      context: .
      dockerfile: ./docker/admin.Dockerfile
      args:
        VITE_API_BASE_URL: http://backend:8080
    container_name: photoset-admin
    restart: unless-stopped
    networks:
      - photoset-network

# ========== 网络与存储卷 ==========
networks:
  photoset-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  uploads_volume:
    driver: local
