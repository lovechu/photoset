version: '3.8'

services:
  # ========== 数据库 ==========
  mysql:
    image: mysql:8.0
    container_name: photoset-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: photoset
      MYSQL_USER: photoset
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - photoset-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  # ========== Redis 缓存 ==========
  redis:
    image: redis:7.2-alpine
    container_name: photoset-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - photoset-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      timeout: 10s
      retries: 5

  # ========== Go 后端服务 ==========
  backend:
    image: backend-backend:latest
    container_name: photoset-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: photoset
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: photoset
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-auto}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
      CORS_ALLOW_ORIGINS: "http://tt.cy.mk,https://tt.cy.mk"
      GIN_MODE: release
    ports:
      - "8080:8080"
    volumes:
      - uploads_volume:/app/uploads
      - ./logs:/app/logs
    networks:
      - photoset-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      timeout: 10s
      retries: 5

  # ========== 用户端 Web ==========
  frontend:
    image: backend-frontend:latest
    container_name: photoset-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - photoset-network

  # ========== 管理后台 Web ==========
  admin:
    image: backend-admin:latest
    container_name: photoset-admin
    restart: unless-stopped
    ports:
      - "3001:80"
    networks:
      - photoset-network

# ========== 网络与存储卷 ==========
networks:
  photoset-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  uploads_volume:
    driver: local
